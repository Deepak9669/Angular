<div align="center" >

    <h1>User Registration</h1>
<h3>{{form.message}}</h3>
<form (submit)="save()">
<table>

    <tr>
        <th>First Name</th>
        <td><input type="text" name="firstName" [(ngModel)]="form.data.firstName" placeholder="firstName name is required"></td>
        <td><span *ngIf="form.inputerror.firstName" style="color:red">{{form.inputerror.firstName}}</span></td>
    </tr>

     <tr>
        <th>Last Name</th>
        <td><input type="text" name="lastName" [(ngModel)]="form.data.lastName" placeholder="lastName name is required"></td>
        <td><span *ngIf="form.inputerror.lastName" style="color:red">{{form.inputerror.lastName}}</span></td>       
    </tr>

     <tr>
                <th>Role</th>
                <td>
                    <select name="roleId" [(ngModel)]="form.data.roleId">
                       <option [ngValue]="" value="undefined">{{'---------Select Role---------' }}</option>
                        <option [value]="1">admin</option>
                        <option [value]="2">student</option>
                        <option [value]="3">faculty</option>
                        <option [value]="4">college</option>
                        <option [value]="5">kiosk</option>
                    </select>
                </td>
            </tr>

     <tr>
        <th>LoginId</th>
        <td><input type="email" name="loginId" [(ngModel)]="form.data.loginId" placeholder="loginId is required"></td>
        <td><span *ngIf="form.inputerror.loginId" style="color:red">{{form.inputerror.loginId}}</span></td>     
    </tr>

     <tr>
        <th>Password</th>
        <td><input type="password" name="password" [(ngModel)]="form.data.password" placeholder="Password is required"></td>
        <td><span *ngIf="form.inputerror.password" style="color:red">{{form.inputerror.password}}</span></td>           
    </tr>

     <tr>
        <th>Dob</th>
        <td><input type="date" name="dob" [(ngModel)]="form.data.dob" placeholder="Date of Birth is required"></td>
        <td><span *ngIf="form.inputerror.dob" style="color:red">{{form.inputerror.dob}}</span></td>     
    </tr>

     <tr>
        <th></th>
        <td><input type="submit" value="singup"></td>
    </tr>


</table>



</form>



</div>
